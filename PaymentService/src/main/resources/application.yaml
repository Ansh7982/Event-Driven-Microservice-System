server:
  port: 8081

spring:
  application:
    name: payment-service

  cloud:
    stream:
      bindings:

        orderConsumer-in-0:
          destination: order-topic
          content-type: application/json

        payments-out-0:
          destination: payments-topic
          content-type: application/json

    kafka:
      binder:
        brokers: localhost:9092
